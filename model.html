<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAILG Македонија — Модел</title>
<meta name="description" content="Детали и спецификации за TAILG електрично возило. Официјален дистрибутер во Македонија. Закажи бесплатно пробно возење.">
<meta property="og:type" content="product">
<meta property="og:site_name" content="TAILG Македонија">
<meta property="og:title" content="TAILG Македонија — Модел">
<meta property="og:description" content="Детали и спецификации за TAILG електрично возило.">
<meta property="og:image" content="img/shark-main.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="model.html">
<link rel="icon" href="img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#E31937;--red-d:#B3122B;--ink:#141414;--ink-2:#2a2a2a;--gray:#F6F6F7;--mid:#6b6b6f;--line:#ececef;--soft:#FEF2F3;--shadow:0 10px 40px rgba(20,20,20,.08);--shadow-l:0 24px 70px rgba(20,20,20,.14)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,Arial,sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:40px;font-weight:700;font-size:15px;padding:13px 26px;cursor:pointer;border:none;transition:.25s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-d);transform:translateY(-2px);box-shadow:0 12px 28px rgba(227,25,55,.32)}
.btn-wa{background:#25D366;color:#fff}.btn-wa:hover{background:#1eb955;transform:translateY(-2px)}
.btn-ghost{background:transparent;border:1.5px solid var(--ink);color:var(--ink)}.btn-ghost:hover{background:var(--ink);color:#fff}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red)}

header{position:sticky;top:0;z-index:90;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:20px;height:72px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:30px}
.logo span{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:3px;border-left:1px solid var(--line);padding-left:10px}
.nav .right{margin-left:auto;display:flex;gap:10px;align-items:center}
.back{font-weight:700;font-size:14px;color:var(--mid)}.back:hover{color:var(--red)}

.crumb{padding:20px 0 0;font-size:13px;color:var(--mid)}
.crumb a:hover{color:var(--red)}

.hero{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;padding:30px 0 60px;align-items:center}
.gallery .main{aspect-ratio:1/.78;background:linear-gradient(160deg,#fafafb,#f0f0f2);border-radius:20px;display:flex;align-items:center;justify-content:center;padding:30px;border:1px solid var(--line);position:relative;overflow:hidden}
.gallery .main img{max-height:100%;object-fit:contain;filter:drop-shadow(0 20px 36px rgba(0,0,0,.16));transition:opacity .18s}
.gallery .main img.fade{opacity:0}
.gal-arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--ink);z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:.2s;user-select:none}
.gal-arrow:hover{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.18);color:var(--red)}
.gal-arrow.prev{left:10px}.gal-arrow.next{right:10px}
.thumbs{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.thumbs img{width:74px;height:62px;object-fit:contain;background:var(--gray);border-radius:10px;padding:6px;border:2px solid transparent;cursor:pointer;transition:.2s}
.thumbs img:hover{transform:translateY(-2px)}
.thumbs img.active{border-color:var(--red)}

.info .name{font-size:clamp(34px,5vw,52px);font-weight:800;letter-spacing:-1.5px;margin:8px 0 6px}
.info .tagline{font-size:18px;color:var(--mid);margin-bottom:22px}
.kspec{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.kspec .b{background:var(--gray);border-radius:14px;padding:16px;text-align:center}
.kspec .b b{font-size:20px;color:var(--red);font-weight:800;display:block}
.kspec .b span{font-size:11px;color:var(--mid);font-weight:600;margin-top:3px;display:block}
.swatches{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.swatches span{font-size:13px;font-weight:700;color:var(--mid)}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);cursor:pointer;transition:.2s}
.dot.active{border-color:var(--red);transform:scale(1.1)}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.price-row .p{font-size:28px;font-weight:800}
.price-row .note{font-size:12px;color:var(--mid)}
.ctas{display:flex;gap:12px;flex-wrap:wrap}

.sec{padding:60px 0}
.sec.gray{background:var(--gray)}
.sec h2{font-size:clamp(24px,3vw,34px);font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:8px}
.sec .sub{text-align:center;color:var(--mid);margin-bottom:40px}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.fcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;transition:.3s}
.fcard:hover{box-shadow:var(--shadow);transform:translateY(-4px)}
.fcard .ic{width:50px;height:50px;border-radius:13px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
.fcard h3{font-size:18px;font-weight:800;margin-bottom:7px}.fcard p{color:var(--mid);font-size:14.5px;line-height:1.6}

.spectable{max-width:760px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.spectable .r{display:flex;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);font-size:15px}
.spectable .r:last-child{border:none}
.spectable .r:nth-child(odd){background:#fcfcfd}
.spectable .r span{color:var(--mid)}.spectable .r b{font-weight:700;text-align:right}

.related{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.3s;position:relative}
.rcard:hover{transform:translateY(-5px);box-shadow:var(--shadow-l)}
.rcard .iw{aspect-ratio:1/.8;background:linear-gradient(160deg,#fafafb,#f0f0f2);display:flex;align-items:center;justify-content:center;padding:14px}
.rcard .iw img{height:100%;object-fit:contain}
.rcard .bd{padding:14px 16px 18px}
.rcard .cat{font-size:10px;color:var(--red);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.rcard .nm{font-size:17px;font-weight:800;margin:2px 0}
.rcard .pr{font-size:13px;font-weight:700;color:var(--ink-2)}
.rcard a.cover{position:absolute;inset:0}

.cta-band{background:radial-gradient(600px 300px at 85% 0%,rgba(255,255,255,.12),transparent 60%),linear-gradient(135deg,#E31937,#B3122B);color:#fff;border-radius:22px;padding:48px;text-align:center}
.cta-band h2{color:#fff;margin-bottom:10px}
.cta-band p{color:rgba(255,255,255,.9);margin-bottom:24px}
.cta-band .btn-red{background:#fff;color:var(--red)}.cta-band .btn-red:hover{background:#fff;color:var(--red-d)}
.cta-band .ctas{justify-content:center}

footer{background:var(--ink);color:#fff;padding:40px 0;text-align:center;margin-top:20px;border-top:4px solid var(--red)}
footer img{height:28px;margin:0 auto 14px;filter:brightness(0) invert(1)}
footer p{color:#7a7a7f;font-size:13px}

.wa-float{position:fixed;right:22px;bottom:22px;z-index:80;width:60px;height:60px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(37,211,102,.5)}
.wa-float svg{width:32px;height:32px;fill:#fff}

/* MODAL (shared with index) */
.modal{position:fixed;inset:0;z-index:200;background:rgba(20,20,20,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-card{background:#fff;border-radius:22px;width:100%;max-width:880px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:var(--shadow-l);max-height:94vh}
.modal-media{background:linear-gradient(160deg,#fafafb,#ececed);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
.modal-media .tag{position:absolute;top:18px;left:18px;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--red)}
.modal-media img{max-height:240px;object-fit:contain;filter:drop-shadow(0 18px 30px rgba(0,0,0,.18))}
.modal-media .mname{margin-top:14px;font-weight:800;font-size:20px}
.modal-form{padding:30px;overflow-y:auto;position:relative}
.modal-form h3{font-size:22px;font-weight:800;letter-spacing:-.5px}
.modal-form .subt{color:var(--mid);font-size:14px;margin:4px 0 18px}
.modal-form .x{position:absolute;top:16px;right:18px;font-size:26px;color:var(--mid);cursor:pointer;line-height:1;background:none;border:none}
.tf{margin-bottom:12px}.tf label{font-size:12px;font-weight:700;display:block;margin-bottom:5px;color:var(--ink-2)}
.tf input,.tf select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:14px;background:#fcfcfd;transition:.2s}
.tf input:focus,.tf select:focus{outline:none;border-color:var(--red);background:#fff}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slots{display:flex;flex-wrap:wrap;gap:7px}
.slot{border:1.5px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;transition:.15s}
.slot:hover{border-color:var(--red)}.slot.active{background:var(--red);color:#fff;border-color:var(--red)}
.modal-actions{display:flex;gap:10px;margin-top:16px}.modal-actions .btn{flex:1;justify-content:center}
.td-ok{text-align:center;padding:30px 10px}.td-ok .chk{width:64px;height:64px;border-radius:50%;background:#eaf8ef;color:#25D366;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px}
.fine{font-size:11px;color:var(--mid)}

@media(max-width:1000px){.hero{grid-template-columns:1fr}.features,.related{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.features,.related{grid-template-columns:1fr}.kspec{grid-template-columns:repeat(3,1fr)}.cta-band{padding:32px 20px}.modal-card{grid-template-columns:1fr;max-width:440px}.modal-media{min-height:160px;order:-1}.modal-media img{max-height:140px}}
@media(max-width:480px){
  .info .name{font-size:32px}
  .ctas{flex-direction:column}.ctas .btn{justify-content:center}
  .modal-form{padding:20px 16px}
  .modal-actions{flex-direction:column}
  .slots{gap:5px}.slot{padding:7px 10px;font-size:12px}
  .thumbs img{width:60px;height:50px}
  .related{grid-template-columns:repeat(2,1fr)}
  .spectable .r{flex-direction:column;gap:4px;padding:12px 16px}.spectable .r b{text-align:left}
}
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a href="index.html" class="logo"><img src="img/logo.png" alt="TAILG"><span>МАКЕДОНИЈА</span></a>
    <div class="right">
      <a href="index.html#modeli" class="back">← Сите модели</a>
      <a onclick="openTestDrive()" class="btn btn-red" style="cursor:pointer">Пробно возење</a>
    </div>
  </div>
</header>

<div class="wrap crumb"><a href="index.html">Почетна</a> / <a href="index.html#modeli">Модели</a> / <span id="crumbName">…</span></div>

<main class="wrap" id="app"></main>

<!-- TEST DRIVE MODAL -->
<div class="modal" id="tdModal" onclick="if(event.target===this)closeTestDrive()">
  <div class="modal-card">
    <div class="modal-media"><div class="tag">ПРОБНО ВОЗЕЊЕ</div><img id="tdImg" src="" alt=""><div class="mname" id="tdName"></div></div>
    <div class="modal-form">
      <button class="x" onclick="closeTestDrive()" aria-label="Затвори">×</button>
      <div id="tdBody">
        <h3>Закажи пробно возење</h3>
        <div class="subt">Бесплатно, без обврска. Ќе те контактираме за потврда.</div>
        <form onsubmit="return submitTD(event)">
          <div class="tf-row">
            <div class="tf"><label>Име и презиме</label><input required placeholder="Твоето име"></div>
            <div class="tf"><label>Телефон</label><input required placeholder="+389 7X XXX XXX"></div>
          </div>
          <div class="tf"><label>Модел</label><select id="tdModel" onchange="syncTDImg()"></select></div>
          <div class="tf-row">
            <div class="tf"><label>Датум</label><input type="date" id="tdDate" required></div>
            <div class="tf"><label>Град</label><input value="Скопје" required></div>
          </div>
          <div class="tf"><label>Преферирано време</label><div class="slots" id="tdSlots"></div></div>
          <div class="modal-actions">
            <button type="submit" class="btn btn-red">Потврди термин</button>
            <a id="tdWa" href="#" class="btn btn-wa">💬 WhatsApp</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<a href="https://wa.me/389XXXXXXXX" class="wa-float" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.477-.911zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
</a>

<script src="catalog.js"></script>
<script>
const catLabel={bike:"Спорт е-байк",moto:"Е-Мотоцикл",scooter:"Е-Скутер"};
const COLORS={bike:["#1c1c1c","#E31937","#f5f5f5"],moto:["#1c1c1c","#E31937","#f5f5f5","#2E5090"],scooter:["#f5f5f5","#1c1c1c","#E31937"]};
const params=new URLSearchParams(location.search);
const id=params.get('id')||TAILG_CATALOG[0].id;
const m=TAILG_CATALOG.find(x=>x.id===id)||TAILG_CATALOG[0];
const catLabelMeta={bike:"Спорт е-байк",moto:"Е-Мотоцикл",scooter:"Е-Скутер"};
const metaDesc=`TAILG ${m.name} — ${m.tagline}. ${m.specs["Мотор"]?m.specs["Мотор"]+", ":""}${m.specs["Дострел"]||""}${m.specs["Дострел"]?" дострел. ":""}Официјален дистрибутер во Македонија. Бесплатно пробно возење.`;
document.title=`TAILG ${m.name} — ${m.tagline} | TAILG Македонија`;
document.querySelector('meta[name="description"]').content=metaDesc;
document.querySelector('meta[property="og:title"]').content=`TAILG ${m.name} — TAILG Македонија`;
document.querySelector('meta[property="og:description"]').content=metaDesc;
document.querySelector('meta[property="og:image"]').content=m.image;
document.querySelector('link[rel="canonical"]').href=`model.html?id=${m.id}`;
document.getElementById('crumbName').textContent=m.name;
const imgs=(m.gallery&&m.gallery.length)?m.gallery:[m.image];
const waMsg=`https://wa.me/389XXXXXXXX?text=${encodeURIComponent("Здраво! Ме интересира TAILG "+m.name+". Може ли понуда?")}`;

const ks=[];
if(m.specs["Мотор"])ks.push(["Мотор",m.specs["Мотор"]]);
if(m.specs["Дострел"])ks.push(["Дострел",m.specs["Дострел"]]);
if(m.specs["Макс. брзина"])ks.push(["Брзина",m.specs["Макс. брзина"]]);
while(ks.length<3){const ex=Object.entries(m.specs).find(([k])=>!ks.some(x=>x[0]===k));if(ex)ks.push([ex[0],ex[1]]);else break;}

const feats=[
  ["🏍️","Моќ без компромис",m.specs["Мотор"]?`${m.specs["Мотор"]} мотор${m.specs["Наклон"]?`, искачува ${m.specs["Наклон"]} наклон`:""}. Силна динамика за град и пат.`:"Силен магнетен мотор за стабилна динамика."],
  ["🔋","Возиш подолго",m.specs["Дострел"]?`${m.specs["Дострел"]} на едно полнење${m.specs["Батерија"]?`. ${m.specs["Батерија"]}`:""}.`:"Долгодострелна TAILG технологија."],
  ["🛡️","Безбедно секогаш",m.specs["Сопирачки"]?`${m.specs["Сопирачки"]}${m.specs["Гуми"]?`. Гуми ${m.specs["Гуми"]}`:""}.`:"Сигурни сопирачки и осветлување."]
];

document.getElementById('app').innerHTML=`
<section class="hero">
  <div class="gallery">
    <div class="main" id="galMain">
      <div class="gal-arrow prev" id="galPrev" onclick="galStep(-1)">&#8249;</div>
      <img id="mainImg" src="${imgs[0]}" alt="TAILG ${m.name}">
      <div class="gal-arrow next" id="galNext" onclick="galStep(1)">&#8250;</div>
    </div>
    <div class="thumbs" id="thumbs">${imgs.map((s,i)=>`<img src="${s}" class="${i===0?'active':''}" onclick="galGo(${i})" loading="lazy">`).join("")}</div>
  </div>
  <div class="info">
    <div class="eyebrow">TAILG · ${catLabel[m.category]}</div>
    <div class="name">${m.name}</div>
    <div class="tagline">${m.tagline}</div>
    <div class="kspec">${ks.map(([k,v])=>`<div class="b"><b>${v}</b><span>${k}</span></div>`).join("")}</div>
    <div class="swatches"><span>Боја:</span>${(COLORS[m.category]||["#1c1c1c"]).map((c,i)=>`<div class="dot ${i===0?'active':''}" style="background:${c}" onclick="this.parentNode.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));this.classList.add('active')"></div>`).join("")}<small style="color:var(--mid);font-size:11px">(достапност по барање)</small></div>
    <div class="price-row"><div class="p">${tailgPrice(m.price)}</div><div class="note">* ориентациона цена — подлежи на промена</div></div>
    <div class="ctas">
      <a onclick="openTestDrive('${m.id}')" class="btn btn-red" style="cursor:pointer">📅 Закажи пробно возење</a>
      <a href="${waMsg}" class="btn btn-wa">💬 WhatsApp</a>
      <a href="index.html#kontakt" class="btn btn-ghost">Понуда</a>
    </div>
  </div>
</section>

<section class="sec" style="padding-top:24px">
  <div style="position:relative;border-radius:20px;overflow:hidden;aspect-ratio:16/9;max-height:540px;border:1px solid var(--line)">
    <img src="img/${m.id}-scene.jpg" alt="TAILG ${m.name} во амбиент" onerror="this.closest('section').style.display='none'" style="width:100%;height:100%;object-fit:cover">
    <div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,8,10,.78),rgba(8,8,10,.05) 55%)"></div>
    <div style="position:absolute;left:30px;bottom:26px;color:#fff;right:30px">
      <div style="font-size:12px;font-weight:800;letter-spacing:2px;color:#ffd9df;text-transform:uppercase">TAILG ${catLabel[m.category]}</div>
      <div style="font-size:clamp(26px,4vw,42px);font-weight:800;letter-spacing:-1px;line-height:1.05">${m.name}</div>
      <div style="font-size:15px;color:#e8e8ec;max-width:560px">${m.tagline}</div>
    </div>
  </div>
</section>

<section class="sec gray">

/* Gallery controller */
const galImgs=imgs;let galIdx=0;
function galGo(idx){
  if(idx<0)idx=galImgs.length-1;if(idx>=galImgs.length)idx=0;
  const mi=document.getElementById('mainImg');
  mi.classList.add('fade');
  setTimeout(()=>{mi.src=galImgs[idx];mi.classList.remove('fade');},160);
  document.querySelectorAll('#thumbs img').forEach((el,i)=>{el.classList.toggle('active',i===idx);if(i===idx)el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});});
  galIdx=idx;
}
function galStep(d){galGo(galIdx+d);}
function setImg(s,el){galGo(galImgs.indexOf(s));}
/* Keyboard nav */
document.addEventListener('keydown',e=>{
  if(e.key==="ArrowLeft")galStep(-1);
  else if(e.key==="ArrowRight")galStep(1);
  else if(e.key==="Escape")closeTestDrive();
});
/* Touch swipe */
(()=>{const el=document.getElementById('galMain');let tx=0;
el.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
el.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)galStep(dx<0?1:-1);},{passive:true});})();
function playVid(id){document.getElementById('vidfac').innerHTML=`<iframe width="100%" height="100%" style="position:absolute;inset:0;border:0" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" title="TAILG video" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;}

const rel=TAILG_CATALOG.filter(x=>x.category===m.category&&x.id!==m.id);
const relList=(rel.length?rel:TAILG_CATALOG.filter(x=>x.id!==m.id)).slice(0,4);
document.getElementById('related').innerHTML=relList.map(r=>`
  <div class="rcard"><div class="iw"><img src="${r.image}" alt="${r.name}" loading="lazy"></div>
  <div class="bd"><div class="cat">${catLabel[r.category]}</div><div class="nm">${r.name}</div><div class="pr">${tailgPrice(r.price)}</div></div>
  <a class="cover" href="model.html?id=${r.id}"></a></div>`).join("");

/* Test-drive modal (shared) */
const tdSel=document.getElementById('tdModel');
TAILG_CATALOG.forEach(x=>{const o=document.createElement('option');o.value=x.id;o.textContent=x.name;tdSel.appendChild(o);});
const TIMES=["10:00","11:30","13:00","15:00","16:30","18:00"];let tdTime=TIMES[0];
const sw=document.getElementById('tdSlots');
TIMES.forEach((t,i)=>{const s=document.createElement('div');s.className="slot"+(i===0?" active":"");s.textContent=t;s.onclick=()=>{document.querySelectorAll('.slot').forEach(x=>x.classList.remove('active'));s.classList.add('active');tdTime=t;};sw.appendChild(s);});
document.getElementById('tdDate').min=new Date().toISOString().split('T')[0];
function syncTDImg(){const mm=TAILG_CATALOG.find(x=>x.id===tdSel.value);if(mm){document.getElementById('tdImg').src=mm.image;document.getElementById('tdName').textContent="TAILG "+mm.name;document.getElementById('tdWa').href="https://wa.me/389XXXXXXXX?text="+encodeURIComponent("Здраво! Сакам пробно возење за TAILG "+mm.name+".");}}
function openTestDrive(mid){document.querySelector('#tdBody form')?.reset?.();tdSel.value=mid||m.id;syncTDImg();document.getElementById('tdModal').classList.add('open');document.body.style.overflow="hidden";}
function closeTestDrive(){document.getElementById('tdModal').classList.remove('open');document.body.style.overflow="";}
function submitTD(e){e.preventDefault();const mm=TAILG_CATALOG.find(x=>x.id===tdSel.value);const dt=document.getElementById('tdDate').value;
  document.getElementById('tdBody').innerHTML=`<div class="td-ok"><div class="chk">✓</div><h3>Терминот е примен!</h3><div class="subt">Бараше пробно возење за <b>TAILG ${mm?mm.name:""}</b>${dt?` на ${dt}`:""} во ${tdTime}.<br>Ќе те контактираме за потврда.</div><button class="btn btn-red" style="margin-top:14px" onclick="closeTestDrive()">Во ред</button><p class="fine" style="margin-top:12px">Демо: поврзи со е-пошта/CRM/календар пред пуштање во живо.</p></div>`;return false;}
document.addEventListener('keydown',e=>{if(e.key==="Escape")closeTestDrive();});
window.scrollTo(0,0);
</script>
